name: Deploy to Lab

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'main.py'
      - 'middleware_*.py'
      - '.github/workflows/build-and-push.yml'
  workflow_dispatch:

jobs:
  deploy:
    uses: crt-platform/infrastructure/.github/workflows/_deploy-docker-ecs.yml@feature/fargate-migration
    with:
      service_name: crt-creative-studio
      repo: crt-platform/vertex-ai-creative-studio
    secrets: inherit
