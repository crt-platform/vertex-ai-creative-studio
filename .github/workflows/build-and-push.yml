name: Build and Push to ECR

on:
  push:
    branches: [ main ]
    paths:
      - 'Dockerfile'
      - 'main.py'
      - 'middleware_*.py'
      - 'ecs_aws.tf'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-south-2

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region eu-south-2 | \
          docker login --username AWS --password-stdin 911540681189.dkr.ecr.eu-south-2.amazonaws.com

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            911540681189.dkr.ecr.eu-south-2.amazonaws.com/skl/crt-creative-studio:latest
            911540681189.dkr.ecr.eu-south-2.amazonaws.com/skl/crt-creative-studio:${{ github.sha }}

      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster crt-lab \
            --service crt-creative-studio \
            --force-new-deployment \
            --region eu-south-2
