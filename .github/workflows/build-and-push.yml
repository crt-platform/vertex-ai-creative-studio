name: Build and Deploy to Lab

on:
  push:
    branches: [ main ]
    paths:
      - 'Dockerfile'
      - 'main.py'
      - 'middleware_*.py'
      - '.github/workflows/build-and-push.yml'
  workflow_dispatch:

jobs:
  deploy:
    uses: crt-platform/infrastructure/.github/workflows/_docker-build-push.yml@feature/fargate-migration
    with:
      service_name: crt-creative-studio
      ecr_repo: skl/crt-creative-studio
      ecs_cluster: crt-lab
      dockerfile: Dockerfile
      platforms: linux/amd64
    secrets: inherit
